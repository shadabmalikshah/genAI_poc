name: SAST-Secret-Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run GitHub Advanced Security Secret Scan
        uses: github/secret-scanning-action@v1
        with:
          fail-on-secrets: true
