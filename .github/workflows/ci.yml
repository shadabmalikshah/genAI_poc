name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [node, python]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (Node)
        if: matrix.language == 'node'
        run: |
          cd app-node
          npm ci
      - name: Install dependencies (Python)
        if: matrix.language == 'python'
        run: |
          cd app-python
          pip install -r requirements.txt
      - name: Run tests (Node)
        if: matrix.language == 'node'
        run: |
          cd app-node
          npm test || true # allow failures for POC
      - name: Run tests (Python)
        if: matrix.language == 'python'
        run: |
          cd app-python
          pytest || true # allow failures for POC
