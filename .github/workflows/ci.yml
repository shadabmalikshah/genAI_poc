name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [node, python]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (Node)
        if: matrix.language == 'node'
        run: |
          cd app-node
          npm ci
      - name: Install dependencies (Python)
        if: matrix.language == 'python'
        run: |
          cd app-python
          pip install -r requirements.txt
      - name: Run tests (Node)
        if: matrix.language == 'node'
        run: |
          cd app-node
          npm test || true # allow failures for POC
      - name: Run tests (Python)
        if: matrix.language == 'python'
        run: |
          cd app-python
          pytest || true # allow failures for POC

  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r app-python/ -ll || true # soft-fail for POC; remove || true to enforce

      - name: Run npm audit (Node.js dependency vulnerability scan)
        run: |
          cd app-node
          npm ci
          npm audit --audit-level=high || true # soft-fail for POC; remove || true to enforce

      - name: Run Checkov (Terraform IaC SAST)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac/
          framework: terraform
          soft_fail: true
